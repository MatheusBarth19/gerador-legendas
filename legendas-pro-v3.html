<style>

body{

background:url("https://images.unsplash.com/photo-1517816743773-6e0fd518b4a6");
background-size:cover;
background-position:center;
background-attachment:fixed;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* overlay escuro */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
backdrop-filter: blur(2px);
z-index:0;
}

.card{
position:relative;
z-index:1;
width:390px;
padding:35px;
background:rgba(255,255,255,0.15);
backdrop-filter: blur(18px);
-webkit-backdrop-filter: blur(18px);
border-radius:24px;
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 20px 60px rgba(0,0,0,0.4);
color:#ffffff;
text-shadow:0 1px 2px rgba(0,0,0,0.6);
animation:subir .6s ease;
}

@keyframes subir{
from{transform:translateY(30px);opacity:0}
to{transform:translateY(0);opacity:1}
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

input, select{
width:100%;
padding:14px;
border-radius:14px;
border:none;
margin-top:12px;
font-size:15px;
background:rgba(0,0,0,0.35);
color:#ffffff;
outline:none;
}

input::placeholder{
color:rgba(255,255,255,0.7);
}

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(0,0,0,0.4);
}

.copy{
background:linear-gradient(135deg,#00ff87,#60efff);
}

#resultado{
margin-top:22px;
background:rgba(0,0,0,0.35);
color:#ffffff;
padding:18px;
border-radius:16px;
min-height:110px;
font-size:14.5px;
line-height:1.5;
}

.loader{
margin-top:20px;
text-align:center;
display:none;
}

.spinner{
width:30px;
height:30px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
animation:girar 1s linear infinite;
margin:auto;
}

@keyframes girar{
to{transform:rotate(360deg)}
}

.footer{
margin-top:15px;
font-size:11px;
text-align:center;
opacity:.7;
}

</style>
</head>

function gerar(){

let tema=document.getElementById("tema").value.trim()
let tipo=document.getElementById("tipo").value

if(!tema){
alert("Digite um tema")
return
}

document.getElementById("loader").style.display="block"
document.getElementById("resultado").innerHTML=""

setTimeout(()=>{

let frases=banco[tipo]

if(!historico[tipo]) historico[tipo]=[]

legendasGeradas=[]

for(let i=0;i<3;i++){

let disponiveis=frases.filter(f=>!historico[tipo].includes(f))

if(disponiveis.length===0){
historico[tipo]=[]
disponiveis=frases
}

let sorteio=Math.floor(Math.random()*disponiveis.length)
let base=disponiveis[sorteio]

let frase=base.replaceAll("{tema}",tema)

legendasGeradas.push(frase)
historico[tipo].push(base)

}

let html=""

legendasGeradas.forEach((f,i)=>{
html+=(i+1)+". "+f+"<br><br>"
})

document.getElementById("loader").style.display="none"
document.getElementById("resultado").innerHTML=html

},700)

}

function copiar(){

if(legendasGeradas.length===0){
alert("Gere legendas primeiro")
return
}

navigator.clipboard.writeText(legendasGeradas.join("\n\n"))
alert("Copiado")

}
